  set:async(k,v)=>{localStorage.setItem('w2_'+k,v);return{key:k,value:v}},
  delete:async(k)=>{localStorage.removeItem('w2_'+k);return{key:k,deleted:true}},

};

/* ═══ UTILS ═══ */
function vis(item,dark){return !(item.darkOnly&&!dark);}
function visList(list,dark){return list.filter(i=>vis(i,dark));}
function itemFullyDone(id,checked,item){
  if(item&&item.mutable&&!item.skip) return !!checked[id]&&!!checked[id+'_m'];
  return !!checked[id];
}
function cntBuildDone(skills,checked){
  return skills.filter(s=>!s.skip&&itemFullyDone(s.id,checked,s)).length;
}
function cntTalentsDone(skills,checked){return skills.filter(s=>!s.skip&&checked[s.id]).length;}
function cntMutagensDone(skills,checked){return skills.filter(s=>s.mutable&&checked[s.id+'_m']).length;}

/* ═══ TREE BADGE STYLES ═══ */
function treeStyle(tree){
  if(tree==='Training')     return {color:C.tTrain, bg:C.tTrainBg, bd:C.tTrainBd};
  if(tree==='Alchemy')      return {color:C.tAlch,  bg:C.tAlchBg,  bd:C.tAlchBd};
  if(tree==='Swordsmanship')return {color:C.tSword, bg:C.tSwordBg, bd:C.tSwordBd};
  return {color:C.silv,bg:C.bgCard,bd:C.border};
}

/* ═══ BASE COMPONENTS ═══ */
function Bar({done,total,color=C.gold}){
  const pct=total>0?Math.round(done/total*100):0;
  return(
    <div style={{display:'flex',alignItems:'center',gap:'8px',width:'100%'}}>
      <div style={{flex:1,height:'5px',background:'#130c04',border:`1px solid ${C.border}`,borderRadius:'3px',overflow:'hidden'}}>
        <div style={{height:'100%',width:`${pct}%`,background:`linear-gradient(90deg,${color}88,${color})`,borderRadius:'3px',transition:'width 0.5s',boxShadow:pct>0?`0 0 5px ${color}55`:'none'}}/>
      </div>
      <span style={{color:pct===100?C.goldLt:C.silv,fontSize:'11px',fontFamily:FD,minWidth:'48px',textAlign:'right'}}>{done}/{total}</span>
    </div>
  );
}
function Divider({label}){
  return(
    <div style={{display:'flex',alignItems:'center',gap:'12px',margin:'16px 0 8px'}}>

/* ═══ SECTION (With sorting logic) ═══ */
function Section({title,items,checked,onToggle,darkDiff,defaultOpen=true,sortCompleted=false}){
  const[open,setOpen]=useState(defaultOpen);
  const v=visList(items,darkDiff);
  const d=v.filter(i=>checked[i.id]).length;
  const done=d===v.length&&v.length>0;

  // Sorting logic: if checked, drop to bottom. Inside the done group, newest completion is on top.
  const displayItems = !sortCompleted ? v : v.map((item, idx) => ({item, idx})).sort((a, b) => {
    const valA = checked[a.item.id];
    const valB = checked[b.item.id];
    const isDoneA = !!valA;
    const isDoneB = !!valB;

    if (isDoneA !== isDoneB) return isDoneA ? 1 : -1;
    if (isDoneA && isDoneB) {
      const timeA = typeof valA === 'number' ? valA : 0;
      const timeB = typeof valB === 'number' ? valB : 0;
      if (timeB !== timeA) return timeB - timeA; 
    }
    return a.idx - b.idx;
  }).map(o => o.item);

  return(
    <div style={{marginBottom:'6px'}}>
      <div onClick={()=>setOpen(o=>!o)}
        style={{display:'flex',alignItems:'center',gap:'8px',padding:'7px 12px',
          background:done?'#1a1408':C.bgHdr,cursor:'pointer',
          border:`1px solid ${done?C.gold+'44':C.border}`,borderRadius:'4px',transition:'all 0.2s'}}>
        <span style={{color:C.gold,fontSize:'10px',transition:'transform 0.2s',transform:open?'rotate(90deg)':'rotate(0deg)'}}>▶</span>
        <span style={{fontFamily:FD,fontSize:'12px',letterSpacing:'1px',color:done?C.goldLt:C.gold,textTransform:'uppercase',flex:1}}>{title}</span>
        {done&&<span style={{fontSize:'9px',color:C.goldLt,border:`1px solid ${C.gold}44`,borderRadius:'10px',padding:'1px 7px',fontFamily:FD}}>DONE</span>}
        <Bar done={d} total={v.length}/>
      </div>
      {open&&(
        <div style={{background:C.bgCard,border:`1px solid ${C.border}`,borderTop:'none',borderRadius:'0 0 4px 4px',paddingTop:'4px',paddingBottom:'4px'}}>
          {displayItems.map(item=><QItem key={item.id} item={item} checked={checked} onToggle={onToggle} darkDiff={darkDiff}/>)}
        </div>
      )}
    </div>
  );
}

      </div>
    </div>
  );

/* ═══ COLLECT TAB ═══ */
function CollectTab({type,items,checked,onToggle,skipped,onSkipToggle,label,warning}){
  const[search,setSearch]=useState('');
  const allIds=items.map((_,i)=>({id:`${type}${i}`}));
  const d=allIds.filter(i=>checked[i.id]).length;
  const filtered=items.reduce((acc,n,i)=>{if(n.toLowerCase().includes(search.toLowerCase()))acc.push([n,i]);return acc;},[]);
  return(
    <div>
      <SkipToggle skipped={skipped} onToggle={onSkipToggle} label={label}/>
      {!skipped&&<>
        <div style={{display:'flex',gap:'10px',alignItems:'center',marginBottom:'14px',background:C.bgHdr,border:`1px solid ${C.border}`,borderRadius:'5px',padding:'10px 14px'}}>
          <span style={{fontFamily:FD,fontSize:'12px',color:d===items.length?C.goldLt:C.gold}}>{d}/{items.length}</span>
          <Bar done={d} total={items.length}/>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search..."
            style={{background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:'3px',padding:'4px 10px',color:C.parch,fontFamily:FB,fontSize:'13px',width:'160px',outline:'none'}}/>
        </div>
        {warning&&<div style={{fontFamily:FB,fontSize:'12px',color:C.parchDm,fontStyle:'italic',marginBottom:'10px',padding:'7px 12px',background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:'4px'}}>⚠ {warning}</div>}
        <div style={{columns:'2',columnGap:'6px'}}>
          {filtered.map(([name,origIdx])=>{
            const id=`${type}${origIdx}`,isDone=!!checked[id];
            return(
              <div key={id} onClick={()=>onToggle(id)}
                style={{display:'flex',alignItems:'center',gap:'7px',padding:'4px 8px',cursor:'pointer',borderRadius:'3px',breakInside:'avoid',marginBottom:'2px',background:isDone?C.doneBg:'transparent'}}
                onMouseEnter={e=>{if(!isDone)e.currentTarget.style.background=C.bgHdr;}}
                onMouseLeave={e=>{e.currentTarget.style.background=isDone?C.doneBg:'transparent';}}>
                <div style={{width:'13px',height:'13px',flexShrink:0,border:`1.5px solid ${isDone?C.gold:C.goldDk}`,borderRadius:'2px',background:isDone?C.gold:'transparent',display:'flex',alignItems:'center',justifyContent:'center'}}>
                  {isDone&&<span style={{color:C.bgDk,fontSize:'8px',fontWeight:'700'}}>✓</span>}
                </div>
                <span style={{fontFamily:FB,fontSize:'13px',color:isDone?C.doneTx:C.parch,textDecoration:isDone?'line-through':'none'}}>{name}</span>
              </div>
            );
          })}
        </div>
      </>}
    </div>
  );
}

}
function AchRow({ach,achDone,pathLocked,onToggle}){
  const[hintOpen,setHintOpen]=useState(false);
  return(
    <div style={{padding:'5px 10px',borderRadius:'3px',
      background:achDone?C.doneBg:'transparent',opacity:pathLocked?0.4:1}}
      onMouseEnter={e=>{if(!achDone)e.currentTarget.style.background=C.bgHdr;}}
      onMouseLeave={e=>{e.currentTarget.style.background=achDone?C.doneBg:'transparent';}}>
      <div style={{display:'flex',alignItems:'flex-start',gap:'7px'}}>
        <span style={{fontSize:'14px',marginTop:'2px',flexShrink:0}}>🏆</span>
        <div style={{flex:1}}>
          <div style={{display:'flex',alignItems:'center',gap:'5px',flexWrap:'wrap'}}>
            <span style={{fontFamily:FB,fontSize:'14px',color:achDone?C.doneTx:C.amber,
              textDecoration:achDone?'line-through':'none',flex:1,lineHeight:'1.3'}}>{ach.name}</span>
            {ach.pathOnly&&(
              <span style={{fontFamily:FD,fontSize:'8px',letterSpacing:'1px',padding:'1px 5px',
                border:`1px solid ${ach.pathOnly==='iorveth'?'#4a8a4a':'#4a7aaa'}`,borderRadius:'2px',
                color:ach.pathOnly==='iorveth'?'#7acc7a':'#7aaacc',flexShrink:0,textTransform:'uppercase'}}>
                {ach.pathOnly==='iorveth'?'🌿 Iorveth':'⚔ Roche'}
              </span>
            )}
            <button onClick={()=>setHintOpen(o=>!o)}
              style={{fontFamily:FD,fontSize:'9px',letterSpacing:'1px',padding:'2px 8px',cursor:'pointer',
                border:`1px solid ${C.amber}55`,background:'transparent',color:C.amber,borderRadius:'3px',
                textTransform:'uppercase',flexShrink:0}}>
              {hintOpen?'▲ Hide':'▼ How to get'}
            </button>
            <div onClick={()=>onToggle(ach.id)} style={{width:'15px',height:'15px',flexShrink:0,cursor:'pointer',
              border:`1.5px solid ${achDone?C.amber:C.goldDk}`,borderRadius:'2px',
              background:achDone?C.amber:'transparent',display:'flex',alignItems:'center',justifyContent:'center',
              transition:'background 0.15s, border-color 0.15s',boxShadow:achDone?`0 0 5px ${C.amber}55`:'none'}}>
              {achDone&&<span style={{color:C.bgDk,fontSize:'9px',fontWeight:'700'}}>✓</span>}
            </div>
          </div>
          {hintOpen&&<div style={{fontFamily:FB,fontSize:'12px',color:C.parchDm,fontStyle:'italic',marginTop:'5px',lineHeight:'1.4',
            background:C.bgHdr,border:`1px solid ${C.border}`,borderRadius:'3px',padding:'7px 10px'}}>
            {ach.desc}
          </div>}
        </div>
      </div>
    </div>
  );
}

function App(){
  const[loaded,setLoaded]=useState(false);
  const[tab,setTab]=useState('overview');
  const[path,setPath]=useState(null);
  const[darkDiff,setDarkDiff]=useState(false);
  const[checked,setChecked]=useState({});
  const[skipped,setSkipped]=useState({books:false,formulas:false,diagrams:false,passives:false});

  useEffect(()=>{
    async function load(){
      try{
        const r=await window.storage.get('w2v5');
        if(r){const d=JSON.parse(r.value);setPath(d.path??null);setDarkDiff(d.darkDiff??false);setChecked(d.checked??{});setSkipped(d.skipped??{books:false,formulas:false,diagrams:false,passives:false});}
      }catch(e){}
      setLoaded(true);
    }
    load();
  },[]);

  useEffect(()=>{
    if(!loaded)return;
    window.storage.set('w2v5',JSON.stringify({path,darkDiff,checked,skipped})).catch(()=>{});
  },[path,darkDiff,checked,skipped,loaded]);

  // Track timestamps for intelligent sorting
  const toggle=useCallback((id)=>{
    setChecked(prev=>{
      const next={...prev};
      if(next[id]){
        delete next[id];
      } else {
        next[id] = Date.now();
      }
      return next;
    });
  },[]);

  const toggleSkip=key=>setSkipped(p=>({...p,[key]:!p[key]}));
  const handleReset=()=>{
    if(confirm('Reset all progress? This cannot be undone.')){
      setChecked({});setPath(null);setDarkDiff(false);
      setSkipped({books:false,formulas:false,diagrams:false,passives:false});
    }
  };

  const c2data=path==='roche'?CHAPTER2.roche:CHAPTER2.iorveth;
  const c3data=path==='roche'?CHAPTER3.roche:CHAPTER3.iorveth;
  const c2title=path==='roche'?'Chapter II — Kaedwen':path==='iorveth'?'Chapter II — Vergen':'Chapter II';
  const c3title='Chapter III — Loc Muinne';

  return(
    <div style={{background:C.bgDk,minHeight:'100vh',color:C.parch,fontFamily:FB,
      backgroundImage:'radial-gradient(ellipse at 15% 0%,#1e0e0433 0%,transparent 55%),radial-gradient(ellipse at 85% 100%,#0a0e1833 0%,transparent 55%)'}}>
      {/* header */}
      <div style={{background:`linear-gradient(180deg,${C.bgHdr} 0%,${C.bgCard} 100%)`,borderBottom:`1px solid ${C.border2}`,padding:'14px 20px',boxShadow:'0 4px 20px #00000088'}}>
        <div style={{maxWidth:'1140px',margin:'0 auto',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div>
            <div style={{fontFamily:FD,fontSize:'20px',fontWeight:'700',color:C.gold,letterSpacing:'4px',textTransform:'uppercase',textShadow:`0 0 20px ${C.gold}33`}}>The Witcher 2</div>
            <div style={{fontFamily:FD,fontSize:'9px',letterSpacing:'5px',color:C.parchDm,textTransform:'uppercase',marginTop:'1px'}}>Assassins of Kings — Checklist</div>
          </div>
          <div style={{display:'flex',gap:'8px'}}>
            {path&&<div style={{fontFamily:FD,fontSize:'9px',letterSpacing:'2px',padding:'3px 10px',border:`1px solid ${path==='roche'?'#4a7aaa':'#4a8a4a'}`,borderRadius:'3px',color:path==='roche'?'#7aaacc':'#7acc7a',textTransform:'uppercase'}}>{path==='roche'?'⚔ Roche':'🌿 Iorveth'}</div>}
            {darkDiff&&<div style={{fontFamily:FD,fontSize:'9px',letterSpacing:'2px',padding:'3px 10px',border:`1px solid ${C.red}55`,borderRadius:'3px',color:C.redLt,textTransform:'uppercase'}}>☠ Dark</div>}
          </div>
        </div>
      </div>
      {/* nav */}
      <div style={{background:C.bgCard,borderBottom:`1px solid ${C.border}`,overflowX:'auto',whiteSpace:'nowrap',position:'sticky',top:0,zIndex:100,boxShadow:'0 2px 12px #00000099'}}>
        <div style={{maxWidth:'1140px',margin:'0 auto',display:'flex',padding:'0 12px'}}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)}
              style={{fontFamily:FD,fontSize:'10px',letterSpacing:'1px',padding:'11px 13px',cursor:'pointer',background:'transparent',border:'none',whiteSpace:'nowrap',borderBottom:`2px solid ${tab===t.id?C.gold:'transparent'}`,color:tab===t.id?C.gold:C.parchDm,textTransform:'uppercase',transition:'all 0.12s'}}>
              {t.label}
            </button>
          ))}
        </div>
      </div>
      {/* content */}
      <div style={{maxWidth:'1140px',margin:'0 auto',padding:'20px 14px'}}>
        {tab!=='overview'&&(
          <div style={{marginBottom:'18px',paddingBottom:'10px',borderBottom:`1px solid ${C.border}`}}>
            <h2 style={{fontFamily:FD,fontSize:'17px',fontWeight:'600',color:C.gold,letterSpacing:'3px',textTransform:'uppercase',margin:0}}>
              {tab==='prologue'?'Prologue':tab==='ch1'?'Chapter I — Flotsam':
               tab==='ch2'?c2title:tab==='ch3'?c3title:
               tab==='build'?'Build Planner':tab==='passives'?'Passive Abilities':
               tab==='books'?`Books (${BOOKS.length})`:tab==='formulas'?`Formulas (${FORMULAS.length})`:
               tab==='diagrams'?`Diagrams (${DIAGRAMS.length})`:tab==='achievements'?'Achievements':''}
            </h2>
          </div>
        )}
        {tab==='overview'&&<Overview checked={checked} path={path} darkDiff={darkDiff} skipped={skipped} onPathChange={setPath} onDarkChange={setDarkDiff} onReset={handleReset}/>}
        {tab==='prologue'&&<QuestTab data={PROLOGUE} checked={checked} onToggle={toggle} darkDiff={darkDiff} showBonus={false}/>}
        {tab==='ch1'&&<QuestTab data={CHAPTER1} checked={checked} onToggle={toggle} darkDiff={darkDiff} showBonus={true}/>}
        {tab==='ch2'&&(!path?<div style={{textAlign:'center',padding:'48px',fontFamily:FD,fontSize:'13px',color:C.parchDm}}>Set your path in Overview to see Chapter II quests.</div>:<QuestTab data={c2data} checked={checked} onToggle={toggle} darkDiff={darkDiff} showBonus={true}/>)}
        {tab==='ch3'&&(!path?<div style={{textAlign:'center',padding:'48px',fontFamily:FD,fontSize:'13px',color:C.parchDm}}>Set your path in Overview to see Chapter III quests.</div>:<QuestTab data={c3data} checked={checked} onToggle={toggle} darkDiff={darkDiff} showBonus={true}/>)}
        {tab==='build'&&<BuildTab checked={checked} onToggle={toggle}/>}
        {tab==='passives'&&<PassivesTab path={path} checked={checked} onToggle={toggle} skipped={skipped.passives} onSkipToggle={()=>toggleSkip('passives')}/>}
        {tab==='books'&&<CollectTab type="bk" items={BOOKS} checked={checked} onToggle={toggle} skipped={skipped.books} onSkipToggle={()=>toggleSkip('books')} label="Books"/>}
        {tab==='formulas'&&<CollectTab type="fo" items={FORMULAS} checked={checked} onToggle={toggle} skipped={skipped.formulas} onSkipToggle={()=>toggleSkip('formulas')} label="Alchemy Formulas"/>}
        {tab==='diagrams'&&<CollectTab type="dg" items={DIAGRAMS} checked={checked} onToggle={toggle} skipped={skipped.diagrams} onSkipToggle={()=>toggleSkip('diagrams')} label="Crafting Diagrams" warning="Some diagrams drop randomly — 100% may not be possible in a single playthrough."/>}
        {tab==='achievements'&&<AchievementsTab checked={checked} onToggle={toggle} path={path}/>}
      </div>
      {!loaded&&<div style={{position:'fixed',inset:0,background:C.bgDk,display:'flex',alignItems:'center',justifyContent:'center',zIndex:9999}}><div style={{fontFamily:FD,fontSize:'13px',letterSpacing:'3px',color:C.gold,textTransform:'uppercase'}}>Loading...</div></div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
