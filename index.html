<script>
window.storage={
  get:async(k)=>{const v=localStorage.getItem('w2_'+k);return v!==null?{key:k,value:v}:null},
  set:async(k,v)=>{localStorage.setItem('w2_'+k,v);return{key:k,value:v}},
  delete:async(k)=>{localStorage.removeItem('w2_'+k);return{key:k,deleted:true}},
  list:async(p)=>({keys:Object.keys(localStorage).filter(k=>k.startsWith('w2_'+(p||''))).map(k=>k.slice(3))})
};

/* ═══ UTILS ═══ */
function vis(item,dark){return !(item.darkOnly&&!dark);}
function visList(list,dark){return list.filter(i=>vis(i,dark));}
function itemFullyDone(id,checked,item){
  if(item&&item.mutable&&!item.skip) return !!checked[id]&&!!checked[id+'_m'];
  return !!checked[id];
}
function cntBuildDone(skills,checked){
  return skills.filter(s=>!s.skip&&itemFullyDone(s.id,checked,s)).length;
}
function cntTalentsDone(skills,checked){return skills.filter(s=>!s.skip&&checked[s.id]).length;}
function cntMutagensDone(skills,checked){return skills.filter(s=>s.mutable&&checked[s.id+'_m']).length;}

/* ═══ TREE BADGE STYLES ═══ */
function treeStyle(tree){
  if(tree==='Training')     return {color:C.tTrain, bg:C.tTrainBg, bd:C.tTrainBd};
  if(tree==='Alchemy')      return {color:C.tAlch,  bg:C.tAlchBg,  bd:C.tAlchBd};
  if(tree==='Swordsmanship')return {color:C.tSword, bg:C.tSwordBg, bd:C.tSwordBd};
  return {color:C.silv,bg:C.bgCard,bd:C.border};
}

/* ═══ BASE COMPONENTS ═══ */
function Bar({done,total,color=C.gold}){
  const pct=total>0?Math.round(done/total*100):0;
  return(
    <div style={{display:'flex',alignItems:'center',gap:'8px',width:'100%'}}>
      <div style={{flex:1,height:'5px',background:'#130c04',border:`1px solid ${C.border}`,borderRadius:'3px',overflow:'hidden'}}>
        <div style={{height:'100%',width:`${pct}%`,background:`linear-gradient(90deg,${color}88,${color})`,borderRadius:'3px',transition:'width 0.5s',boxShadow:pct>0?`0 0 5px ${color}55`:'none'}}/>
      </div>
      <span style={{color:pct===100?C.goldLt:C.silv,fontSize:'11px',fontFamily:FD,minWidth:'48px',textAlign:'right'}}>{done}/{total}</span>
    </div>
  );
}
function Divider({label}){
  return(
    <div style={{display:'flex',alignItems:'center',gap:'12px',margin:'16px 0 8px'}}>
      <div style={{flex:1,height:'1px',background:`linear-gradient(90deg,transparent,${C.goldDk})`}}/>
      {label&&<span style={{color:C.gold,fontFamily:FD,fontSize:'10px',letterSpacing:'3px',textTransform:'uppercase'}}>{label}</span>}
      <div style={{flex:1,height:'1px',background:`linear-gradient(270deg,transparent,${C.goldDk})`}}/>
    </div>
  );
}
function WolfRing({pct}){
  const r=42,circ=2*Math.PI*r,offset=circ*(1-pct/100);
  return(
    <svg viewBox="0 0 100 100" width="76" height="76" style={{filter:'drop-shadow(0 0 8px #c8a03066)'}}>
      <circle cx="50" cy="50" r={r} fill="none" stroke={C.goldDk} strokeWidth="2.5"/>
      <circle cx="50" cy="50" r={r} fill="none" stroke={C.gold} strokeWidth="2.5"
        strokeDasharray={circ} strokeDashoffset={offset}
        style={{transform:'rotate(-90deg)',transformOrigin:'50% 50%',transition:'stroke-dashoffset 0.8s'}}/>
      <text x="50" y="42" textAnchor="middle" fill={C.gold} fontSize="24" fontFamily={FD}>🐺</text>
      <text x="50" y="60" textAnchor="middle" fill={C.goldLt} fontSize="11" fontFamily={FD} fontWeight="600">{pct}%</text>
    </svg>
  );
}
function Checkbox({checked,onChange,color=C.gold,size=15}){
  return(
    <div onClick={onChange} style={{width:size,height:size,flexShrink:0,cursor:'pointer',
      border:`1.5px solid ${checked?color:C.goldDk}`,borderRadius:'2px',
      background:checked?color:'transparent',display:'flex',alignItems:'center',justifyContent:'center',
      transition:'all 0.15s',boxShadow:checked?`0 0 5px ${color}55`:'none'}}>
      {checked&&<span style={{color:C.bgDk,fontSize:Math.floor(size*0.65)+'px',fontWeight:'700',lineHeight:1}}>✓</span>}
    </div>
  );
}

/* ═══ SKIP BANNER ═══ */
function SkipToggle({skipped,onToggle,label}){
  return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',
      padding:'10px 14px',background:skipped?'#1a1208':'#130c04',
      border:`1px solid ${skipped?C.goldDk:C.border}`,borderRadius:'6px',marginBottom:'12px'}}>
      <div>
        <span style={{fontFamily:FD,fontSize:'11px',letterSpacing:'1px',color:skipped?C.goldLt:C.parchDm,textTransform:'uppercase'}}>
          {skipped?`✓ ${label} — Marked as N/A`:`${label} — tracking enabled`}
        </span>
        {skipped&&<div style={{fontFamily:FB,fontSize:'12px',color:C.parchDm,fontStyle:'italic',marginTop:'2px'}}>Excluded from overall progress</div>}
      </div>
      <button onClick={onToggle} style={{fontFamily:FD,fontSize:'10px',letterSpacing:'1px',padding:'5px 12px',cursor:'pointer',
        border:`1px solid ${skipped?C.redLt:C.goldDk}`,background:'transparent',
        color:skipped?C.redLt:C.parchDm,borderRadius:'3px',textTransform:'uppercase',transition:'all 0.15s'}}>
        {skipped?'Re-enable':'Mark N/A'}
      </button>
    </div>
  );
}

/* ═══ QUEST ITEM ═══ */
function QItem({item,checked,onToggle,darkDiff,showModal}){
  if(!vis(item,darkDiff))return null;
  const done=!!checked[item.id];
  return(
    <div style={{display:'flex',alignItems:'flex-start',gap:'8px',padding:'5px 10px',borderRadius:'3px',
      background:done?C.doneBg:'transparent'}}
      onMouseEnter={e=>{if(!done)e.currentTarget.style.background=C.bgHdr;}}
      onMouseLeave={e=>{e.currentTarget.style.background=done?C.doneBg:'transparent';}}>
      <div style={{marginTop:'2px',flexShrink:0}}>
        <Checkbox checked={done} onChange={()=>onToggle(item.id,item)}/>
      </div>
      <div style={{flex:1,cursor:'pointer'}} onClick={()=>onToggle(item.id,item)}>
        <div style={{fontFamily:FB,fontSize:'14px',color:done?C.doneTx:C.parch,
          textDecoration:done?'line-through':'none',transition:'all 0.15s',lineHeight:'1.35'}}>
          {item.name}
          {item.darkOnly&&<span style={{marginLeft:'6px',fontSize:'10px',color:C.redLt,border:`1px solid ${C.redLt}44`,borderRadius:'2px',padding:'0 3px'}}>DARK</span>}
        </div>
        {item.note&&!done&&<div style={{fontFamily:FB,fontSize:'12px',color:C.parchDm,fontStyle:'italic',marginTop:'1px'}}>{item.note}</div>}
      </div>
      {item.ach&&(
        <div onClick={()=>showModal&&showModal(item)}
          style={{flexShrink:0,cursor:'pointer',display:'flex',alignItems:'center',gap:'4px',
            padding:'1px 7px',border:`1px solid #3a3010`,borderRadius:'10px',background:'#12100a',
            marginTop:'1px',transition:'all 0.15s'}}
          onMouseEnter={e=>e.currentTarget.style.borderColor=C.amber}
          onMouseLeave={e=>e.currentTarget.style.borderColor='#3a3010'}>
          <span style={{fontSize:'11px'}}>⭐</span>
          <span style={{fontFamily:FD,fontSize:'9px',letterSpacing:'1px',color:C.amber,textTransform:'uppercase'}}>Ach</span>
        </div>
      )}
    </div>
  );
}

/* ═══ SECTION ═══ */
function Section({title,items,checked,onToggle,darkDiff,showModal,defaultOpen=true}){
  const[open,setOpen]=useState(defaultOpen);
  const v=visList(items,darkDiff);
  const d=v.filter(i=>checked[i.id]).length;
  const done=d===v.length&&v.length>0;
  return(
    <div style={{marginBottom:'6px'}}>
      <div onClick={()=>setOpen(o=>!o)}
        style={{display:'flex',alignItems:'center',gap:'8px',padding:'7px 12px',
          background:done?'#1a1408':C.bgHdr,cursor:'pointer',
          border:`1px solid ${done?C.gold+'44':C.border}`,borderRadius:'4px',transition:'all 0.2s'}}>
        <span style={{color:C.gold,fontSize:'10px',transition:'transform 0.2s',transform:open?'rotate(90deg)':'rotate(0deg)'}}>▶</span>
        <span style={{fontFamily:FD,fontSize:'12px',letterSpacing:'1px',color:done?C.goldLt:C.gold,textTransform:'uppercase',flex:1}}>{title}</span>
        {done&&<span style={{fontSize:'9px',color:C.goldLt,border:`1px solid ${C.gold}44`,borderRadius:'10px',padding:'1px 7px',fontFamily:FD}}>DONE</span>}
        <Bar done={d} total={v.length}/>
      </div>
      {open&&(
        <div style={{background:C.bgCard,border:`1px solid ${C.border}`,borderTop:'none',borderRadius:'0 0 4px 4px',paddingTop:'4px',paddingBottom:'4px'}}>
          {v.map(item=><QItem key={item.id} item={item} checked={checked} onToggle={onToggle} darkDiff={darkDiff} showModal={showModal}/>)}
        </div>
      )}
    </div>
  );
}

/* ═══ ACH MODAL ═══ */
function AchModal({item,onClose}){
  if(!item||!item.ach)return null;
  return(
    <div onClick={onClose} style={{position:'fixed',inset:0,background:'#000000aa',zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div onClick={e=>e.stopPropagation()}
        style={{background:C.bgCard,border:`1px solid ${C.amber}66`,borderRadius:'8px',padding:'24px',maxWidth:'400px',width:'90%',boxShadow:`0 8px 32px ${C.bgDk}`}}>
        <div style={{fontFamily:FD,fontSize:'11px',color:C.amber,letterSpacing:'3px',textTransform:'uppercase',marginBottom:'12px'}}>⭐ Achievement</div>
        <div style={{fontFamily:FD,fontSize:'16px',color:C.amberLt,marginBottom:'10px'}}>{item.ach.label}</div>
        <div style={{fontFamily:FB,fontSize:'14px',color:C.parch,lineHeight:'1.5'}}>{item.ach.hint}</div>
        <div onClick={onClose} style={{marginTop:'18px',fontFamily:FD,fontSize:'10px',letterSpacing:'2px',color:C.parchDm,textTransform:'uppercase',cursor:'pointer',textAlign:'right'}}>Close ✕</div>

/* ═══ OVERVIEW CARD ═══ */
function OCard({label,done,total,skipped=false}){
  const pct=total>0?Math.round(done/total*100):0;
  return(
    <div style={{background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:'5px',padding:'12px 14px',

/* ═══ OVERVIEW ═══ */
function Overview({checked,path,darkDiff,skipped,onPathChange,onDarkChange,onReset}){
  const c2=path==='roche'?CHAPTER2.roche:CHAPTER2.iorveth;
  const c3=path==='roche'?CHAPTER3.roche:CHAPTER3.iorveth;
  const c2p=path==='roche'?PASSIVES.roche:PASSIVES.iorveth;
  const allPass=[...PASSIVES.prologue,...PASSIVES.chapter1,...c2p,...PASSIVES.chapter3];
  const activeBuild=BUILD_SKILLS.filter(s=>!s.skip);
  const bk=BOOKS.map((_,i)=>({id:`bk${i}`}));
  const fo=FORMULAS.map((_,i)=>({id:`fo${i}`}));
  const dg=DIAGRAMS.map((_,i)=>({id:`dg${i}`}));
  const sections=[
    {label:'Prologue',items:[...PROLOGUE.main,...PROLOGUE.side],sk:false},
    {label:'Chapter I',items:[...CHAPTER1.main,...CHAPTER1.side],sk:false},
    {label:'Chapter II',items:[...c2.main,...c2.side],sk:false},
    {label:'Chapter III',items:[...c3.main,...c3.side],sk:false},
    {label:'Build Skills',items:activeBuild,sk:false,isBuild:true},
    {label:'Passives',items:allPass,sk:skipped.passives},
    {label:'Books',items:bk,sk:skipped.books},
    {label:'Formulas',items:fo,sk:skipped.formulas},
    {label:'Diagrams',items:dg,sk:skipped.diagrams},
    {label:'Endings',items:ENDINGS,sk:false},
  ];
  let totalDone=0,totalCount=0;
  sections.filter(s=>!s.sk).forEach(s=>{
    const v=s.items.filter(i=>!i.darkOnly||darkDiff);
    totalCount+=v.length;
    if(s.isBuild) totalDone+=cntBuildDone(v,checked);
    else totalDone+=v.filter(i=>checked[i.id]).length;
  });
  const pct=totalCount>0?Math.round(totalDone/totalCount*100):0;
  return(
    <div>
      <div style={{display:'flex',alignItems:'center',gap:'20px',marginBottom:'24px',
        background:`linear-gradient(135deg,${C.bgHdr},${C.bgCard})`,
        border:`1px solid ${C.border2}`,borderRadius:'8px',padding:'20px 24px',boxShadow:'inset 0 1px 0 #ffffff08'}}>
        <WolfRing pct={pct}/>
        <div style={{flex:1}}>
          <div style={{fontFamily:FD,fontSize:'10px',color:C.silv,letterSpacing:'3px',textTransform:'uppercase',marginBottom:'4px'}}>Overall Completion</div>
          <div style={{fontFamily:FD,fontSize:'30px',color:pct===100?C.goldLt:C.gold,lineHeight:1,marginBottom:'8px'}}>{pct}<span style={{fontSize:'16px'}}>%</span></div>
          <Bar done={totalDone} total={totalCount}/>
          <div style={{fontFamily:FB,fontSize:'12px',color:C.parchDm,marginTop:'4px',fontStyle:'italic'}}>
            {sections.filter(s=>s.sk).length>0&&`${sections.filter(s=>s.sk).map(s=>s.label).join(', ')} excluded (N/A)`}
          </div>
        </div>
      </div>
      <div style={{background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:'8px',padding:'14px 18px',marginBottom:'18px'}}>
        <div style={{fontFamily:FD,fontSize:'10px',letterSpacing:'2px',color:C.gold,textTransform:'uppercase',marginBottom:'10px'}}>⚙ Campaign Settings</div>
        <div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
          <PathBadge path={path} onPathChange={onPathChange}/>
          <div style={{display:'flex',gap:'10px',alignItems:'center'}}>
            <span style={{fontFamily:FD,fontSize:'10px',color:C.silv,letterSpacing:'1px',textTransform:'uppercase'}}>Difficulty:</span>
            <button onClick={()=>onDarkChange(!darkDiff)}
              style={{fontFamily:FD,fontSize:'10px',padding:'4px 12px',cursor:'pointer',letterSpacing:'1px',
                border:`1px solid ${darkDiff?C.redLt:C.border}`,background:darkDiff?'#2a0808':'transparent',
                color:darkDiff?C.redLt:C.parchDm,borderRadius:'3px',transition:'all 0.15s',textTransform:'uppercase'}}>
              {darkDiff?'☠ Dark Mode ON':'☠ Dark Mode'}
            </button>
          </div>
        </div>
      </div>
      {!path&&(
        <div style={{background:'#1a1005',border:`1px solid ${C.gold}44`,borderRadius:'5px',padding:'10px 14px',marginBottom:'16px',display:'flex',gap:'8px',alignItems:'center'}}>
          <span style={{color:C.gold}}>⚠</span>
          <span style={{fontFamily:FB,fontSize:'13px',color:C.parch}}>Set your <strong style={{color:C.gold}}>path</strong> above — it determines Chapter II &amp; III quests and passives.</span>
        </div>
      )}
      <Divider label="Section Progress"/>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px'}}>
        {sections.map(s=>{
          const v=s.items.filter(i=>!i.darkOnly||darkDiff);

/* ═══ BUILD ITEM ═══ */
function BuildItem({item,checked,onToggle}){
  const ts=treeStyle(item.tree);
  const talentDone=!!checked[item.id];
  const mutagenDone=!!checked[item.id+'_m'];
  const fullyDone=item.mutable?(talentDone&&mutagenDone):talentDone;
  const displayName=item.rank?`${item.name} — rank ${item.rank}`:item.name;

  if(item.skip){
    return(
      <div style={{display:'flex',alignItems:'center',gap:'10px',padding:'5px 10px',opacity:0.4}}>
        <span style={{fontFamily:FD,fontSize:'10px',color:C.parchDm,background:C.bgHdr,border:`1px solid ${C.border}`,borderRadius:'3px',padding:'1px 6px',minWidth:'28px',textAlign:'center'}}>#{item.n}</span>
        <span style={{fontFamily:FD,fontSize:'10px',padding:'1px 7px',border:`1px solid ${ts.bd}`,borderRadius:'3px',color:ts.color,background:ts.bg,textTransform:'uppercase',letterSpacing:'1px'}}>{item.tree}</span>
        <span style={{fontFamily:FB,fontSize:'12px',color:C.parchDm,fontStyle:'italic'}}>{displayName} — intentionally skipped</span>
      </div>
    );
  }

  return(
    <div style={{padding:'4px 10px',borderRadius:'3px',
      background:fullyDone?C.doneBg:talentDone&&item.mutable?'#121a12':'transparent',
      border:item.mutable?`1px solid ${fullyDone?C.green+'55':talentDone?C.green+'33':C.greenDk}`:'1px solid transparent',
      marginBottom:item.mutable?'2px':0,transition:'all 0.15s'}}
      onMouseEnter={e=>{if(!fullyDone)e.currentTarget.style.background=C.bgHdr;}}
      onMouseLeave={e=>{e.currentTarget.style.background=fullyDone?C.doneBg:talentDone&&item.mutable?'#121a12':'transparent';}}>
      <div style={{display:'flex',alignItems:'flex-start',gap:'8px'}}>
        {/* point number + tree badge */}
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:'3px',flexShrink:0,paddingTop:'2px'}}>
          <span style={{fontFamily:FD,fontSize:'10px',color:C.parchDm,background:C.bgHdr,border:`1px solid ${C.border}`,borderRadius:'3px',padding:'1px 5px',minWidth:'28px',textAlign:'center',lineHeight:'1.4'}}>#{item.n}</span>
          <span style={{fontFamily:FD,fontSize:'7px',padding:'1px 5px',border:`1px solid ${ts.bd}`,borderRadius:'3px',color:ts.color,background:ts.bg,textTransform:'uppercase',letterSpacing:'0.5px',whiteSpace:'nowrap'}}>{item.tree==='Swordsmanship'?'Sword':item.tree}</span>
        </div>
        {/* talent checkbox (and mutagen for mutable) */}
        {item.mutable?(
          <div style={{display:'flex',gap:'6px',flexShrink:0,paddingTop:'2px'}}>
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:'2px'}}>
              <Checkbox checked={talentDone} onChange={()=>onToggle(item.id)} color={C.gold}/>
              <span style={{fontFamily:FD,fontSize:'7px',color:C.goldDk,textTransform:'uppercase',lineHeight:1}}>talent</span>
            </div>
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:'2px',opacity:talentDone?1:0.3,transition:'opacity 0.2s',pointerEvents:talentDone?'auto':'none'}}>
              <Checkbox checked={mutagenDone} onChange={()=>onToggle(item.id+'_m')} color={C.greenLt} size={15}/>
              <span style={{fontFamily:FD,fontSize:'7px',color:C.greenDk,textTransform:'uppercase',lineHeight:1}}>mutagen</span>
            </div>
          </div>
        ):(
          <div style={{paddingTop:'2px',flexShrink:0}}>
            <Checkbox checked={talentDone} onChange={()=>onToggle(item.id)} color={C.gold}/>
          </div>
        )}
        {/* name + note */}
        <div style={{flex:1,cursor:'pointer'}} onClick={()=>!item.mutable&&onToggle(item.id)}>
          <div style={{display:'flex',alignItems:'center',gap:'6px',flexWrap:'wrap'}}>

              color:fullyDone?C.doneTx:item.mutable?C.greenLt:C.parch,
              textDecoration:fullyDone?'line-through':'none',transition:'all 0.15s',lineHeight:'1.4'}}>{displayName}</span>
            {item.mutable&&!fullyDone&&(

                border:`1px solid ${C.green}`,borderRadius:'10px',color:C.greenLt,background:C.greenDk,textTransform:'uppercase',flexShrink:0}}>◈ Mutable</span>

/* ═══ MAIN APP ═══ */
const TABS=[
  {id:'overview',label:'⚔ Overview'},{id:'prologue',label:'Prologue'},{id:'ch1',label:'Chapter I'},
  {id:'ch2',label:'Chapter II'},{id:'ch3',label:'Chapter III'},{id:'build',label:'Build'},
  {id:'passives',label:'Passives'},{id:'books',label:'Books'},{id:'formulas',label:'Formulas'},
  {id:'diagrams',label:'Diagrams'},{id:'endings',label:'Endings'},{id:'achievements',label:'⭐ Achievements'},
];

function App(){
  const[loaded,setLoaded]=useState(false);
  const[tab,setTab]=useState('overview');
  const[path,setPath]=useState(null);
  const[darkDiff,setDarkDiff]=useState(false);
  const[checked,setChecked]=useState({});
  const[skipped,setSkipped]=useState({books:false,formulas:false,diagrams:false,passives:false});
  const[modal,setModal]=useState(null);

  useEffect(()=>{
    async function load(){
      try{
        const r=await window.storage.get('w2v5');
        if(r){const d=JSON.parse(r.value);setPath(d.path??null);setDarkDiff(d.darkDiff??false);setChecked(d.checked??{});setSkipped(d.skipped??{books:false,formulas:false,diagrams:false,passives:false});}
      }catch(e){}
      setLoaded(true);
    }
    load();
  },[]);

  useEffect(()=>{
    if(!loaded)return;
    window.storage.set('w2v5',JSON.stringify({path,darkDiff,checked,skipped})).catch(()=>{});
  },[path,darkDiff,checked,skipped,loaded]);

  const toggle=useCallback((id,item)=>{
    setChecked(prev=>{
      const next={...prev,[id]:!prev[id]};
      // auto-mark linked achievement when quest is ticked ON
      if(!prev[id]&&item&&item.achId){
        const achKey=`ach_${item.achId}`;
        if(!next[achKey]) next[achKey]=true;
      }
      return next;
    });
  },[]);

  const toggleSkip=key=>setSkipped(p=>({...p,[key]:!p[key]}));
  const handleReset=()=>{
    if(confirm('Reset all progress? This cannot be undone.')){
      setChecked({});setPath(null);setDarkDiff(false);
      setSkipped({books:false,formulas:false,diagrams:false,passives:false});
    }
  };

  const c2data=path==='roche'?CHAPTER2.roche:CHAPTER2.iorveth;
  const c3data=path==='roche'?CHAPTER3.roche:CHAPTER3.iorveth;
  const c2title=path==='roche'?'Chapter II — Kaedwen':path==='iorveth'?'Chapter II — Vergen':'Chapter II';
  const c3title=path==='roche'?'Chapter III — Roche':path==='iorveth'?'Chapter III — Iorveth':'Chapter III';

  return(
    <div style={{background:C.bgDk,minHeight:'100vh',color:C.parch,fontFamily:FB,
      backgroundImage:'radial-gradient(ellipse at 15% 0%,#1e0e0433 0%,transparent 55%),radial-gradient(ellipse at 85% 100%,#0a0e1833 0%,transparent 55%)'}}>
      {/* header */}
      <div style={{background:`linear-gradient(180deg,${C.bgHdr} 0%,${C.bgCard} 100%)`,borderBottom:`1px solid ${C.border2}`,padding:'14px 20px',boxShadow:'0 4px 20px #00000088'}}>
        <div style={{maxWidth:'1140px',margin:'0 auto',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div>
            <div style={{fontFamily:FD,fontSize:'20px',fontWeight:'700',color:C.gold,letterSpacing:'4px',textTransform:'uppercase',textShadow:`0 0 20px ${C.gold}33`}}>The Witcher 2</div>
            <div style={{fontFamily:FD,fontSize:'9px',letterSpacing:'5px',color:C.parchDm,textTransform:'uppercase',marginTop:'1px'}}>Assassins of Kings — Checklist</div>
          </div>
          <div style={{display:'flex',gap:'8px'}}>
            {path&&<div style={{fontFamily:FD,fontSize:'9px',letterSpacing:'2px',padding:'3px 10px',border:`1px solid ${path==='roche'?'#4a7aaa':'#4a8a4a'}`,borderRadius:'3px',color:path==='roche'?'#7aaacc':'#7acc7a',textTransform:'uppercase'}}>{path==='roche'?'⚔ Roche':'🌿 Iorveth'}</div>}
            {darkDiff&&<div style={{fontFamily:FD,fontSize:'9px',letterSpacing:'2px',padding:'3px 10px',border:`1px solid ${C.red}55`,borderRadius:'3px',color:C.redLt,textTransform:'uppercase'}}>☠ Dark</div>}
          </div>
        </div>
      </div>
      {/* nav */}
      <div style={{background:C.bgCard,borderBottom:`1px solid ${C.border}`,overflowX:'auto',whiteSpace:'nowrap'}}>
        <div style={{maxWidth:'1140px',margin:'0 auto',display:'flex',padding:'0 12px'}}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)}
              style={{fontFamily:FD,fontSize:'10px',letterSpacing:'1px',padding:'11px 13px',cursor:'pointer',background:'transparent',border:'none',whiteSpace:'nowrap',borderBottom:`2px solid ${tab===t.id?C.gold:'transparent'}`,color:tab===t.id?C.gold:C.parchDm,textTransform:'uppercase',transition:'all 0.12s'}}>
              {t.label}
            </button>
          ))}
        </div>
      </div>
      {/* content */}
      <div style={{maxWidth:'1140px',margin:'0 auto',padding:'20px 14px'}}>
        {tab!=='overview'&&(
          <div style={{marginBottom:'18px',paddingBottom:'10px',borderBottom:`1px solid ${C.border}`}}>
            <h2 style={{fontFamily:FD,fontSize:'17px',fontWeight:'600',color:C.gold,letterSpacing:'3px',textTransform:'uppercase',margin:0}}>
              {tab==='prologue'?'Prologue':tab==='ch1'?'Chapter I — Flotsam':
               tab==='ch2'?c2title:tab==='ch3'?c3title:
               tab==='build'?'Build Planner (34 pts)':tab==='passives'?'Passive Abilities':
               tab==='books'?`Books (${BOOKS.length})`:tab==='formulas'?`Formulas (${FORMULAS.length})`:
               tab==='diagrams'?`Diagrams (${DIAGRAMS.length})`:tab==='endings'?'All Endings':'Steam Achievements'}
            </h2>
          </div>
        )}
        {tab==='overview'&&<Overview checked={checked} path={path} darkDiff={darkDiff} skipped={skipped} onPathChange={setPath} onDarkChange={setDarkDiff} onReset={handleReset}/>}
        {tab==='prologue'&&<QuestTab data={PROLOGUE} checked={checked} onToggle={toggle} darkDiff={darkDiff} showBonus={false} showModal={setModal}/>}
        {tab==='ch1'&&<QuestTab data={CHAPTER1} checked={checked} onToggle={toggle} darkDiff={darkDiff} showBonus={true} showModal={setModal}/>}
        {tab==='ch2'&&(!path?<div style={{textAlign:'center',padding:'48px',fontFamily:FD,fontSize:'13px',color:C.parchDm}}>Set your path in Overview to see Chapter II quests.</div>:<QuestTab data={c2data} checked={checked} onToggle={toggle} darkDiff={darkDiff} showBonus={true} showModal={setModal}/>)}
        {tab==='ch3'&&(!path?<div style={{textAlign:'center',padding:'48px',fontFamily:FD,fontSize:'13px',color:C.parchDm}}>Set your path in Overview to see Chapter III quests.</div>:<QuestTab data={c3data} checked={checked} onToggle={toggle} darkDiff={darkDiff} showBonus={true} showModal={setModal}/>)}
        {tab==='build'&&<BuildTab checked={checked} onToggle={toggle}/>}
        {tab==='passives'&&<PassivesTab path={path} checked={checked} onToggle={toggle} skipped={skipped.passives} onSkipToggle={()=>toggleSkip('passives')}/>}
        {tab==='books'&&<CollectTab type="bk" items={BOOKS} checked={checked} onToggle={toggle} skipped={skipped.books} onSkipToggle={()=>toggleSkip('books')} label="Books"/>}
        {tab==='formulas'&&<CollectTab type="fo" items={FORMULAS} checked={checked} onToggle={toggle} skipped={skipped.formulas} onSkipToggle={()=>toggleSkip('formulas')} label="Alchemy Formulas"/>}
        {tab==='diagrams'&&<CollectTab type="dg" items={DIAGRAMS} checked={checked} onToggle={toggle} skipped={skipped.diagrams} onSkipToggle={()=>toggleSkip('diagrams')} label="Crafting Diagrams" warning="Some diagrams drop randomly — 100% may not be possible in a single playthrough."/>}
        {tab==='endings'&&<EndingsTab checked={checked} onToggle={toggle}/>}
        {tab==='achievements'&&<AchievementsTab checked={checked} onToggle={toggle}/>}
      </div>
      <AchModal item={modal} onClose={()=>setModal(null)}/>
      {!loaded&&<div style={{position:'fixed',inset:0,background:C.bgDk,display:'flex',alignItems:'center',justifyContent:'center',zIndex:9999}}><div style={{fontFamily:FD,fontSize:'13px',letterSpacing:'3px',color:C.gold,textTransform:'uppercase'}}>Loading...</div></div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
